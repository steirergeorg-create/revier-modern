<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — eigenevier[at]</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Playfair+Display:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --gold:   #e8007d;
      --olive:  #a8c87a;
      --text:   #444;
      --dark:   #3a3a3a;
      --gray:   #888;
      --border: #e0e0e0;
      --light:  #f7f7f7;
      --white:  #fff;
      --font-sans: 'Inter', system-ui, sans-serif;
      --font-serif: 'Playfair Display', Georgia, serif;
    }
    body { font-family: var(--font-sans); background: var(--light); min-height: 100vh; }

    /* Header */
    .header {
      background: var(--white);
      border-bottom: 1px solid var(--border);
      padding: 0 48px;
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .header-logo {
      font-size: 18px;
      font-weight: 500;
      color: #999;
      text-decoration: none;
    }
    .header-logo span { color: var(--olive); }
    .header-badge {
      font-size: 10px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      background: var(--light);
      border: 1px solid var(--border);
      color: var(--gray);
      padding: 4px 12px;
    }

    /* Login Screen */
    .admin-login {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: calc(100vh - 64px);
      padding: 24px;
    }
    .admin-login-card {
      background: var(--white);
      border: 1px solid var(--border);
      padding: 40px;
      width: 100%;
      max-width: 380px;
    }
    .admin-login-title {
      font-family: var(--font-serif);
      font-size: 24px;
      color: var(--dark);
      margin-bottom: 6px;
    }
    .admin-login-sub {
      font-size: 13px;
      color: var(--gray);
      margin-bottom: 28px;
    }

    /* Main */
    .admin-main {
      display: none;
      max-width: 900px;
      margin: 0 auto;
      padding: 40px 48px;
    }
    .admin-main.visible { display: block; }

    /* Tabs */
    .tabs {
      display: flex;
      gap: 0;
      border-bottom: 1px solid var(--border);
      margin-bottom: 32px;
    }
    .tab-btn {
      padding: 12px 24px;
      font-size: 12px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--gray);
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      cursor: pointer;
      font-family: var(--font-sans);
      transition: all 0.2s;
      margin-bottom: -1px;
    }
    .tab-btn.active { color: var(--gold); border-bottom-color: var(--gold); }
    .tab-btn:hover:not(.active) { color: var(--text); }

    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    /* Cards */
    .card {
      background: var(--white);
      border: 1px solid var(--border);
      padding: 32px;
      margin-bottom: 24px;
    }
    .card-title {
      font-size: 11px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--gray);
      margin-bottom: 24px;
    }

    /* Form */
    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-bottom: 16px;
    }
    .form-grid-full { grid-column: 1 / -1; }
    .form-group { display: flex; flex-direction: column; gap: 6px; }
    .form-group label {
      font-size: 11px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--gray);
    }
    .form-group input,
    .form-group select {
      background: var(--light);
      border: 1px solid var(--border);
      color: var(--dark);
      padding: 11px 14px;
      font-family: var(--font-sans);
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }
    .form-group input:focus,
    .form-group select:focus { border-color: var(--gold); }
    .form-group input::placeholder { color: #bbb; }

    /* Buttons */
    .btn {
      padding: 12px 28px;
      font-family: var(--font-sans);
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      cursor: pointer;
      border: none;
      transition: background 0.2s;
    }
    .btn-primary { background: var(--gold); color: #fff; }
    .btn-primary:hover { background: #ff2090; }
    .btn-primary:disabled { background: #ccc; cursor: not-allowed; }
    .btn-outline {
      background: none;
      border: 1px solid var(--border);
      color: var(--gray);
    }
    .btn-outline:hover { border-color: var(--text); color: var(--text); }

    /* Alert */
    .alert {
      display: none;
      padding: 12px 16px;
      font-size: 13px;
      margin-top: 16px;
    }
    .alert-success { background: #f0f8e8; border: 1px solid #c8e8a0; color: #4a7a20; }
    .alert-error   { background: #fff0f5; border: 1px solid #ffc0d8; color: var(--gold); }

    /* Users Table */
    .users-table {
      width: 100%;
      border-collapse: collapse;
    }
    .users-table th {
      font-size: 10px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--gray);
      font-weight: 400;
      padding: 10px 14px;
      text-align: left;
      border-bottom: 2px solid var(--border);
    }
    .users-table td {
      padding: 14px;
      font-size: 13px;
      color: var(--text);
      border-bottom: 1px solid var(--border);
    }
    .users-table tr:last-child td { border-bottom: none; }
    .status-pill {
      display: inline-block;
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 3px 10px;
      background: #f0f8e8;
      color: #5a8a20;
    }

    /* Progress Editor */
    .steps-editor { display: flex; flex-direction: column; gap: 12px; }
    .step-row {
      display: grid;
      grid-template-columns: 2fr 3fr 100px 80px;
      gap: 10px;
      align-items: center;
      padding: 12px;
      background: var(--light);
      border: 1px solid var(--border);
    }
    .step-row select {
      background: var(--white);
      border: 1px solid var(--border);
      padding: 8px 10px;
      font-family: var(--font-sans);
      font-size: 12px;
      color: var(--text);
    }

    @media (max-width: 700px) {
      .header { padding: 0 20px; }
      .admin-main { padding: 24px 20px; }
      .form-grid { grid-template-columns: 1fr; }
      .step-row { grid-template-columns: 1fr 1fr; }
    }
  </style>
</head>
<body>

  <header class="header">
    <a href="index.html" class="header-logo">eıgene<span>v</span>ıer</a>
    <div class="header-badge">Admin Panel</div>
  </header>

  <!-- LOGIN -->
  <div class="admin-login" id="adminLogin">
    <div class="admin-login-card">
      <h1 class="admin-login-title">Admin Zugang</h1>
      <p class="admin-login-sub">Bitte Admin-Schlüssel eingeben.</p>
      <div class="form-group" style="margin-bottom:16px;">
        <label>Admin-Schlüssel</label>
        <input type="password" id="adminKeyInput" placeholder="••••••••" autocomplete="off">
      </div>
      <button class="btn btn-primary" onclick="adminLogin()" style="width:100%">Anmelden</button>
      <div class="alert alert-error" id="adminLoginError">Falscher Schlüssel.</div>
    </div>
  </div>

  <!-- MAIN -->
  <div class="admin-main" id="adminMain">

    <div class="tabs">
      <button class="tab-btn active" onclick="showTab('users')">Benutzer</button>
      <button class="tab-btn" onclick="showTab('create')">Neuer Benutzer</button>
      <button class="tab-btn" onclick="showTab('project')">Projektdaten</button>
    </div>

    <!-- TAB: Benutzer -->
    <div class="tab-panel active" id="tab-users">
      <div class="card">
        <div class="card-title">Angelegte Benutzer</div>
        <div id="usersList">
          <table class="users-table">
            <thead>
              <tr>
                <th>Name</th>
                <th>E-Mail</th>
                <th>Projekt</th>
                <th>Top</th>
                <th>Status</th>
              </tr>
            </thead>
            <tbody id="usersTableBody">
              <tr><td colspan="5" style="color:#bbb;font-size:13px;">Wird geladen…</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>

    <!-- TAB: Neuer Benutzer -->
    <div class="tab-panel" id="tab-create">
      <div class="card">
        <div class="card-title">Neuen Käufer anlegen</div>
        <div class="form-grid">
          <div class="form-group">
            <label>Vorname & Nachname</label>
            <input type="text" id="newName" placeholder="Max Mustermann">
          </div>
          <div class="form-group">
            <label>E-Mail</label>
            <input type="email" id="newEmail" placeholder="max@beispiel.at">
          </div>
          <div class="form-group">
            <label>Passwort</label>
            <input type="text" id="newPassword" placeholder="Temporäres Passwort">
          </div>
          <div class="form-group">
            <label>Projekt</label>
            <select id="newProject">
              <option value="schillerplatz">Schillerplatz 6</option>
              <option value="rottalgasse">Rottalgasse 12</option>
            </select>
          </div>
          <div class="form-group">
            <label>Top-Nummer</label>
            <input type="text" id="newTop" placeholder="04">
          </div>
          <div class="form-group">
            <label>Wohnungstyp</label>
            <input type="text" id="newUnit" placeholder="3-Zimmer · 72 m²">
          </div>
        </div>
        <button class="btn btn-primary" id="createBtn" onclick="createUser()">Benutzer anlegen</button>
        <div class="alert alert-success" id="createSuccess"></div>
        <div class="alert alert-error" id="createError"></div>
      </div>
    </div>

    <!-- TAB: Projektdaten -->
    <div class="tab-panel" id="tab-project">
      <div class="card">
        <div class="card-title">Baufortschritt aktualisieren</div>
        <div class="form-grid" style="margin-bottom:24px;">
          <div class="form-group">
            <label>Projekt</label>
            <select id="editProject" onchange="loadProject()">
              <option value="schillerplatz">Schillerplatz 6</option>
              <option value="rottalgasse">Rottalgasse 12</option>
            </select>
          </div>
          <div class="form-group">
            <label>Gesamtfortschritt (%)</label>
            <input type="number" id="editProgress" min="0" max="100" placeholder="45">
          </div>
        </div>

        <div class="card-title" style="margin-bottom:16px;">Bauabschnitte</div>
        <div class="steps-editor" id="stepsEditor"></div>

        <div style="margin-top:24px;display:flex;gap:12px;">
          <button class="btn btn-primary" onclick="saveProject()">Speichern</button>
          <button class="btn btn-outline" onclick="loadProject()">Zurücksetzen</button>
        </div>
        <div class="alert alert-success" id="projectSuccess"></div>
        <div class="alert alert-error" id="projectError"></div>
      </div>

      <div class="card">
        <div class="card-title">Neuigkeit hinzufügen</div>
        <div class="form-grid">
          <div class="form-group">
            <label>Datum</label>
            <input type="text" id="updateDate" placeholder="03.06.2026">
          </div>
          <div class="form-group form-grid-full">
            <label>Text</label>
            <input type="text" id="updateText" placeholder="Rohbau Stockwerk 3 fertiggestellt…">
          </div>
        </div>
        <button class="btn btn-primary" onclick="addUpdate()">Neuigkeit speichern</button>
        <div class="alert alert-success" id="updateSuccess"></div>
      </div>
    </div>

  </div>

  <script>
    let ADMIN_KEY = '';
    let currentProjectData = null;

    function adminLogin() {
      const key = document.getElementById('adminKeyInput').value;
      if (!key) return;
      ADMIN_KEY = key;
      // Test mit user anlegen (leerer Test)
      fetch('/api/admin/ping', {
        headers: { 'X-Admin-Key': key }
      }).then(async r => {
        // Ping nicht implementiert — direkt versuchen
        document.getElementById('adminLogin').style.display = 'none';
        document.getElementById('adminMain').classList.add('visible');
        loadKnownUsers();
        loadProject();
      });
    }

    // Enter-Taste
    document.getElementById('adminKeyInput').addEventListener('keydown', e => {
      if (e.key === 'Enter') adminLogin();
    });

    function showTab(name) {
      document.querySelectorAll('.tab-btn').forEach((b, i) => {
        b.classList.toggle('active', ['users','create','project'][i] === name);
      });
      document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
      document.getElementById('tab-' + name).classList.add('active');
    }

    // ── Benutzer anlegen ──
    async function createUser() {
      const btn = document.getElementById('createBtn');
      const name = document.getElementById('newName').value.trim();
      const email = document.getElementById('newEmail').value.trim();
      const password = document.getElementById('newPassword').value.trim();
      const project = document.getElementById('newProject').value;
      const top = document.getElementById('newTop').value.trim();
      const unit = document.getElementById('newUnit').value.trim();

      if (!name || !email || !password || !top) {
        showAlert('createError', 'Bitte alle Pflichtfelder ausfüllen.');
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Wird angelegt…';

      try {
        const res = await fetch('/api/admin/user', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'X-Admin-Key': ADMIN_KEY },
          body: JSON.stringify({ name, email, password, project, top, unit })
        });
        const data = await res.json();
        if (res.ok) {
          showAlert('createSuccess', `✓ ${name} (${email}) wurde erfolgreich angelegt.`);
          document.getElementById('newName').value = '';
          document.getElementById('newEmail').value = '';
          document.getElementById('newPassword').value = '';
          document.getElementById('newTop').value = '';
          document.getElementById('newUnit').value = '';
          addUserToTable(name, email, project, top);
        } else {
          showAlert('createError', data.error || 'Fehler beim Anlegen.');
        }
      } catch {
        showAlert('createError', 'Verbindungsfehler.');
      }
      btn.disabled = false;
      btn.textContent = 'Benutzer anlegen';
    }

    // ── Bekannte User aus KV laden ──
    function loadKnownUsers() {
      // Demo: zeige angelegte User (aus localStorage als Cache)
      const cached = JSON.parse(localStorage.getItem('adminUsers') || '[]');
      renderUsers(cached);
    }

    function addUserToTable(name, email, project, top) {
      const cached = JSON.parse(localStorage.getItem('adminUsers') || '[]');
      cached.unshift({ name, email, project, top });
      localStorage.setItem('adminUsers', JSON.stringify(cached));
      renderUsers(cached);
    }

    function renderUsers(users) {
      const tbody = document.getElementById('usersTableBody');
      if (users.length === 0) {
        tbody.innerHTML = '<tr><td colspan="5" style="color:#bbb;font-size:13px;">Noch keine Benutzer angelegt.</td></tr>';
        return;
      }
      tbody.innerHTML = users.map(u => `
        <tr>
          <td>${u.name}</td>
          <td>${u.email}</td>
          <td>${u.project === 'schillerplatz' ? 'Schillerplatz 6' : 'Rottalgasse 12'}</td>
          <td>Top ${u.top}</td>
          <td><span class="status-pill">Aktiv</span></td>
        </tr>
      `).join('');
    }

    // ── Projekt laden & bearbeiten ──
    async function loadProject() {
      const project = document.getElementById('editProject').value;
      try {
        const res = await fetch(`/api/admin/project/${project}`, {
          headers: { 'X-Admin-Key': ADMIN_KEY }
        });
        if (!res.ok) throw new Error();
        currentProjectData = await res.json();
        document.getElementById('editProgress').value = currentProjectData.progress;
        renderSteps(currentProjectData.steps);
      } catch {
        // Fallback: leere Steps
        renderSteps([
          { name: 'Planung & Genehmigung', desc: '', status: 'done', date: '' },
          { name: 'Erdarbeiten & Fundament', desc: '', status: 'done', date: '' },
          { name: 'Rohbau', desc: '', status: 'active', date: '' },
          { name: 'Innenausbau', desc: '', status: 'open', date: '' },
          { name: 'Fertigstellung', desc: '', status: 'open', date: '' }
        ]);
      }
    }

    function renderSteps(steps) {
      const editor = document.getElementById('stepsEditor');
      editor.innerHTML = steps.map((s, i) => `
        <div class="step-row">
          <input type="text" value="${s.name}" placeholder="Bezeichnung" id="stepName${i}" style="background:#fff;border:1px solid var(--border);padding:8px 10px;font-family:var(--font-sans);font-size:13px;color:var(--text);outline:none;">
          <input type="text" value="${s.desc}" placeholder="Beschreibung" id="stepDesc${i}" style="background:#fff;border:1px solid var(--border);padding:8px 10px;font-family:var(--font-sans);font-size:13px;color:var(--text);outline:none;">
          <select id="stepStatus${i}">
            <option value="done" ${s.status==='done'?'selected':''}>✓ Fertig</option>
            <option value="active" ${s.status==='active'?'selected':''}>● Aktiv</option>
            <option value="open" ${s.status==='open'?'selected':''}>○ Offen</option>
          </select>
          <input type="text" value="${s.date||''}" placeholder="Datum" id="stepDate${i}" style="background:#fff;border:1px solid var(--border);padding:8px 10px;font-family:var(--font-sans);font-size:12px;color:var(--text);outline:none;">
        </div>
      `).join('');
    }

    async function saveProject() {
      const project = document.getElementById('editProject').value;
      const progress = parseInt(document.getElementById('editProgress').value) || 0;
      const stepRows = document.querySelectorAll('.step-row');
      const steps = Array.from(stepRows).map((_, i) => ({
        name: document.getElementById(`stepName${i}`).value,
        desc: document.getElementById(`stepDesc${i}`).value,
        status: document.getElementById(`stepStatus${i}`).value,
        date: document.getElementById(`stepDate${i}`).value
      }));

      const data = { ...currentProjectData, progress, steps };

      try {
        const res = await fetch(`/api/admin/project/${project}`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'X-Admin-Key': ADMIN_KEY },
          body: JSON.stringify(data)
        });
        if (res.ok) {
          showAlert('projectSuccess', '✓ Projektdaten gespeichert.');
          currentProjectData = data;
        } else {
          showAlert('projectError', 'Fehler beim Speichern.');
        }
      } catch {
        showAlert('projectError', 'Verbindungsfehler.');
      }
    }

    async function addUpdate() {
      const project = document.getElementById('editProject').value;
      const date = document.getElementById('updateDate').value.trim();
      const text = document.getElementById('updateText').value.trim();
      if (!date || !text) return;

      if (!currentProjectData) return;
      currentProjectData.updates = [{ date, text }, ...(currentProjectData.updates || [])];

      try {
        const res = await fetch(`/api/admin/project/${project}`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'X-Admin-Key': ADMIN_KEY },
          body: JSON.stringify(currentProjectData)
        });
        if (res.ok) {
          showAlert('updateSuccess', '✓ Neuigkeit gespeichert.');
          document.getElementById('updateDate').value = '';
          document.getElementById('updateText').value = '';
        }
      } catch {}
    }

    function showAlert(id, msg) {
      const el = document.getElementById(id);
      el.textContent = msg;
      el.style.display = 'block';
      setTimeout(() => el.style.display = 'none', 4000);
    }
  </script>
</body>
</html>
