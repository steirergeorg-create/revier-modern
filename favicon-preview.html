<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Favicon Vorschläge</title>
  <style>
    body { font-family: sans-serif; background: #f0f0f0; padding: 40px; }
    h1 { font-size: 16px; color: #666; margin-bottom: 32px; }
    .grid { display: flex; flex-wrap: wrap; gap: 32px; }
    .item { background: #fff; padding: 24px; border-radius: 8px; text-align: center; width: 140px; }
    .item svg { display: block; margin: 0 auto 12px; }
    .label { font-size: 12px; color: #999; }
    .num { font-size: 18px; font-weight: 600; color: #333; margin-bottom: 4px; }
    /* Browser-Tab Simulation */
    .tab { background: #e8e8e8; border-radius: 4px 4px 0 0; padding: 6px 12px; display: inline-flex; align-items: center; gap: 6px; margin-top: 12px; font-size: 11px; color: #555; }
    .tab img, .tab svg { width: 16px; height: 16px; }
  </style>
</head>
<body>
  <h1>eigenevier[at] — Favicon Vorschläge (32×32)</h1>
  <div class="grid">

    <!-- 1 -->
    <div class="item">
      <svg width="64" height="64" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
        <rect width="32" height="32" fill="#fff"/>
        <text x="3" y="26" font-family="Inter,Arial,sans-serif" font-size="26" font-weight="600" fill="#999">e</text>
        <circle cx="27" cy="27" r="4" fill="#a8c87a"/>
      </svg>
      <div class="num">1</div>
      <div class="label">e + grüner Punkt</div>
    </div>

    <!-- 2 -->
    <div class="item">
      <svg width="64" height="64" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
        <rect width="32" height="32" fill="#fff"/>
        <text x="2" y="24" font-family="Inter,Arial,sans-serif" font-size="18" font-weight="600" fill="#a8c87a">[</text>
        <text x="9" y="24" font-family="Inter,Arial,sans-serif" font-size="18" font-weight="400" fill="#999">e</text>
        <text x="20" y="24" font-family="Inter,Arial,sans-serif" font-size="18" font-weight="600" fill="#a8c87a">]</text>
      </svg>
      <div class="num">2</div>
      <div class="label">[e] Klammern</div>
    </div>

    <!-- 3 -->
    <div class="item">
      <svg width="64" height="64" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
        <rect width="32" height="32" fill="#a8c87a"/>
        <text x="5" y="24" font-family="Inter,Arial,sans-serif" font-size="20" font-weight="700" fill="#fff">e</text>
        <text x="17" y="24" font-family="Inter,Arial,sans-serif" font-size="14" font-weight="300" fill="rgba(255,255,255,0.8)">v</text>
      </svg>
      <div class="num">3</div>
      <div class="label">Grün + ev</div>
    </div>

    <!-- 4 -->
    <div class="item">
      <svg width="64" height="64" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
        <rect width="32" height="32" fill="#3a3a3a"/>
        <text x="5" y="23" font-family="Inter,Arial,sans-serif" font-size="20" font-weight="600" fill="#a8c87a">e</text>
        <rect x="5" y="26" width="22" height="2" fill="#a8c87a"/>
      </svg>
      <div class="num">4</div>
      <div class="label">Dunkel + Linie</div>
    </div>

    <!-- 5 -->
    <div class="item">
      <svg width="64" height="64" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
        <rect width="32" height="32" fill="#fff"/>
        <text x="4" y="22" font-family="Inter,Arial,sans-serif" font-size="14" font-weight="500" fill="#999">ei</text>
        <text x="4" y="30" font-family="Inter,Arial,sans-serif" font-size="8" font-weight="300" fill="#a8c87a" letter-spacing="1">vier</text>
      </svg>
      <div class="num">5</div>
      <div class="label">ei / vier</div>
    </div>

    <!-- 6 -->
    <div class="item">
      <svg width="64" height="64" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
        <rect width="32" height="32" fill="#fff"/>
        <polygon points="16,2 30,16 16,30 2,16" fill="none" stroke="#a8c87a" stroke-width="2"/>
        <text x="9" y="21" font-family="Inter,Arial,sans-serif" font-size="14" font-weight="600" fill="#888">e</text>
      </svg>
      <div class="num">6</div>
      <div class="label">Raute + e</div>
    </div>

    <!-- 7 -->
    <div class="item">
      <svg width="64" height="64" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
        <rect width="32" height="32" rx="8" fill="#a8c87a"/>
        <text x="6" y="24" font-family="Inter,Arial,sans-serif" font-size="22" font-weight="700" fill="#fff">e</text>
      </svg>
      <div class="num">7</div>
      <div class="label">Grüne Kachel</div>
    </div>

    <!-- 8 -->
    <div class="item">
      <svg width="64" height="64" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
        <rect width="32" height="32" fill="#fff"/>
        <circle cx="16" cy="16" r="14" fill="none" stroke="#e0e0e0" stroke-width="1.5"/>
        <text x="7" y="21" font-family="Inter,Arial,sans-serif" font-size="16" font-weight="500" fill="#888">e</text>
        <circle cx="22" cy="22" r="5" fill="#a8c87a"/>
        <text x="19.5" y="25.5" font-family="Inter,Arial,sans-serif" font-size="7" font-weight="600" fill="#fff">v</text>
      </svg>
      <div class="num">8</div>
      <div class="label">Kreis + e·v</div>
    </div>

    <!-- 9 -->
    <div class="item">
      <svg width="64" height="64" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
        <rect width="32" height="32" fill="#fff"/>
        <text x="1" y="20" font-family="Inter,Arial,sans-serif" font-size="13" font-weight="600" fill="#999">eige</text>
        <text x="1" y="30" font-family="Inter,Arial,sans-serif" font-size="13" font-weight="600" fill="#a8c87a">nevier</text>
      </svg>
      <div class="num">9</div>
      <div class="label">eige / nevier</div>
    </div>

    <!-- 10 -->
    <div class="item">
      <svg width="64" height="64" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
        <rect width="32" height="32" fill="#fff"/>
        <text x="2" y="26" font-family="Inter,Arial,sans-serif" font-size="22" font-weight="200" fill="#bbb">e</text>
        <text x="14" y="26" font-family="Inter,Arial,sans-serif" font-size="16" font-weight="400" fill="#a8c87a">[at]</text>
      </svg>
      <div class="num">10</div>
      <div class="label">e [at]</div>
    </div>

  </div>
</body>
</html>
