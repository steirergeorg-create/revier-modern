<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 50" width="220" height="50">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&amp;display=swap');
      text { font-family: 'Inter', Arial, sans-serif; }
    </style>
  </defs>

  <!-- Bauträger -->
  <text x="15" y="14"
    font-size="12"
    font-weight="300"
    letter-spacing="0"
    fill="#888">Bauträger</text>

  <!-- eigenevier[at] -->
  <!-- e -->
  <text x="0" y="40" font-size="26" font-weight="500" letter-spacing="0.3" fill="#999">e</text>
  <!-- ı (green) -->
  <text x="18" y="40" font-size="26" font-weight="500" fill="#a8c87a">ı</text>
  <!-- gene -->
  <text x="26" y="40" font-size="26" font-weight="500" letter-spacing="0.3" fill="#999">gene</text>
  <!-- v (green) -->
  <text x="86" y="40" font-size="26" font-weight="500" fill="#a8c87a">v</text>
  <!-- ı (gray) -->
  <text x="103" y="40" font-size="26" font-weight="500" fill="#888">ı</text>
  <!-- er -->
  <text x="111" y="40" font-size="26" font-weight="500" letter-spacing="0.3" fill="#999">er</text>
  <!-- space [ -->
  <text x="137" y="40" font-size="26" font-weight="400" fill="#a8c87a"> [</text>
  <!-- at -->
  <text x="152" y="40" font-size="26" font-weight="400" fill="#888">at</text>
  <!-- ] -->
  <text x="183" y="40" font-size="26" font-weight="400" fill="#a8c87a">]</text>
</svg>
