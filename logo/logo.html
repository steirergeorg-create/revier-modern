<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>eigenevier[at] Logo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 40px;
      background: #fff;
      font-family: 'Inter', system-ui, sans-serif;
    }
    .logo {
      display: inline-flex;
      flex-direction: column;
      line-height: 1;
      gap: 2px;
    }
    .logo-sub {
      font-size: 12px;
      font-weight: 300;
      letter-spacing: 0;
      color: #888;
      padding-left: 15px;
      margin-bottom: -8px;
    }
    .logo-text {
      font-size: 26px;
      font-weight: 500;
      letter-spacing: 0.01em;
      color: #999;
    }
    .green { color: #a8c87a; font-weight: inherit; }
    .gray  { color: #888; }
    .bracket { color: #a8c87a; font-weight: 400; }
    .at { color: #888; font-weight: 400; }
  </style>
</head>
<body>
  <div class="logo">
    <span class="logo-sub">Bauträger</span>
    <span class="logo-text">e<span class="green">ı</span>gene<span class="green">v</span><span class="gray">ı</span>er <span class="bracket">[</span><span class="at">at</span><span class="bracket">]</span></span>
  </div>
</body>
</html>
